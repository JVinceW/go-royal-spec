  <rect class="dark" x="295" y="235" width="250" height="46" rx="5"/>
  <text class="btn" x="420" y="264" text-anchor="middle">JOIN ROOM</text>
  <rect class="muted" x="295" y="300" width="250" height="34" rx="5"/>
  <text class="txt small" x="420" y="322" text-anchor="middle">warning  Invalid or full room.</text>
  <line class="line" x1="18" y1="318" x2="778" y2="318"/>
  <text class="txt small" x="40" y="334">wifi  Online</text>
  <text class="txt small" x="155" y="334">v0.1.0 (MVP)</text>
</svg>
