    <line x1="70" y1="103" x2="730" y2="103"/><line x1="70" y1="126" x2="730" y2="126"/><line x1="70" y1="149" x2="730" y2="149"/><line x1="70" y1="172" x2="730" y2="172"/><line x1="70" y1="195" x2="730" y2="195"/><line x1="70" y1="218" x2="730" y2="218"/><line x1="70" y1="241" x2="730" y2="241"/>
