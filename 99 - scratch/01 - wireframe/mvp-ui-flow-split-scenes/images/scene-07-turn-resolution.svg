<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <style>
    .frame{fill:#fff;stroke:#111;stroke-width:3}.grid{fill:#fff;stroke:#999}.safe{fill:none;stroke:#777;stroke-dasharray:5 4}.path{stroke:#111;stroke-width:5;fill:none;marker-end:url(#arrow)}.txt{font-family:Arial,sans-serif;fill:#111}.label{font-size:18px;font-weight:700}.small{font-size:12px}.chip{fill:#fafafa;stroke:#aaa}
  </style>
