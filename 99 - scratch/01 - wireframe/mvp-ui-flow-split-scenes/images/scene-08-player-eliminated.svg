<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <style>
    .frame{fill:#444;stroke:#111;stroke-width:3}.grid{fill:#555;stroke:#333}.modal{fill:#666;stroke:#bbb;stroke-width:2}.txt{font-family:Arial,sans-serif;fill:#fff}.label{font-size:18px;font-weight:700;fill:#111}.title{font-size:28px;font-weight:700}.small{font-size:13px}.dark{fill:#2b2b2b;stroke:#ccc}.chip{fill:#555;stroke:#aaa}
  </style>
  <text class="label" x="0" y="24">8. PLAYER ELIMINATED</text>
  <rect class="frame" x="18" y="40" width="760" height="300" rx="14"/>
  <rect class="grid" x="70" y="80" width="660" height="190"/>
  <g stroke="#666">
    <line x1="143" y1="80" x2="143" y2="270"/><line x1="216" y1="80" x2="216" y2="270"/><line x1="289" y1="80" x2="289" y2="270"/><line x1="362" y1="80" x2="362" y2="270"/><line x1="435" y1="80" x2="435" y2="270"/><line x1="508" y1="80" x2="508" y2="270"/><line x1="581" y1="80" x2="581" y2="270"/><line x1="654" y1="80" x2="654" y2="270"/>
  </g>
  <text class="txt" x="85" y="103" font-size="15">P1</text><text class="txt" x="695" y="103" font-size="15">P2</text><text class="txt" x="85" y="250" font-size="15">P3 ELIMINATED</text><text class="txt" x="695" y="250" font-size="15">P4</text>
  <rect class="modal" x="250" y="130" width="300" height="150" rx="8"/>
