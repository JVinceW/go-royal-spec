    <rect class="card" x="250" y="125" width="135" height="150" rx="6"/><text class="txt label" x="317" y="150" text-anchor="middle">P2</text><circle fill="#999" cx="317" cy="205" r="20"/><path class="card" d="M282 260 Q317 220 352 260"/><text class="txt small" x="317" y="272" text-anchor="middle">check Ready</text>
    <rect class="card" x="410" y="125" width="135" height="150" rx="6"/><text class="txt label" x="477" y="150" text-anchor="middle">P3</text><circle fill="#999" cx="477" cy="205" r="20"/><path class="card" d="M442 260 Q477 220 512 260"/><text class="txt small" x="477" y="272" text-anchor="middle">check Ready</text>
    <rect class="card" x="570" y="125" width="135" height="150" rx="6"/><text class="txt label" x="637" y="150" text-anchor="middle">P4</text><circle fill="#999" cx="637" cy="205" r="20"/><path class="card" d="M602 260 Q637 220 672 260"/><text class="txt small" x="637" y="272" text-anchor="middle">check Ready</text>
