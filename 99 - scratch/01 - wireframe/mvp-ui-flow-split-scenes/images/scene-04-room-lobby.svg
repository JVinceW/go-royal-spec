<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <style>
    .frame{fill:#fff;stroke:#111;stroke-width:3}.card{fill:#fafafa;stroke:#aaa}.line{stroke:#111;stroke-width:2;fill:none}.dark{fill:#2b2b2b}.txt{font-family:Arial,sans-serif;fill:#111}.label{font-size:18px;font-weight:700}.small{font-size:13px}.btn{font-size:16px;font-weight:700;fill:#fff}
  </style>
  <text class="txt label" x="0" y="24">4. ROOM LOBBY</text>
